name: sumo_app
description: "App para practicar sumas - Algoritmo, Calculo Mental y Combate Sumo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  http: ^1.2.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sprites/
    - assets/sprites/mage2/
    - assets/sprites/warrior/
    - assets/sprites/tiger/
    - assets/audio/
